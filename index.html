<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANKALAN — Hyperspace</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; }
canvas { position:absolute; top:0; left:0; }
.ui {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none;
}
.reticle {
  position: relative;
  width: clamp(220px, 32vw, 360px);
  height: clamp(220px, 32vw, 360px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  animation: appear 2.5s ease 0.5s forwards;
}
.reticle-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(160, 210, 255, 0.18);
}
.reticle-ring:nth-child(1) { width: 100%; height: 100%; }
.reticle-ring:nth-child(2) { width: 75%; height: 75%; border-color: rgba(160,210,255,0.1); }
.reticle-ring:nth-child(3) { width: 50%; height: 50%; border-color: rgba(160,210,255,0.08); }
.crosshair-h, .crosshair-v {
  position: absolute;
  background: rgba(150,200,255,0.12);
}
.crosshair-h { width: 85%; height: 1px; }
.crosshair-v { width: 1px; height: 85%; }
.tick {
  position: absolute;
  background: rgba(150,200,255,0.3);
}
.tick-t { width: 1px; height: 12px; top: 0; left: 50%; }
.tick-b { width: 1px; height: 12px; bottom: 0; left: 50%; }
.tick-l { height: 1px; width: 12px; top: 50%; left: 0; }
.tick-r { height: 1px; width: 12px; top: 50%; right: 0; }
.center-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(180,220,255,0.7);
  box-shadow: 0 0 15px rgba(150,200,255,0.9), 0 0 30px rgba(120,180,255,0.4);
  z-index: 1;
}
.main-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(3rem, 9vw, 8.5rem);
  font-weight: 300;
  letter-spacing: 0.3em;
  color: #fff;
  text-transform: uppercase;
  text-align: center;
  text-shadow:
    0 0 35px rgba(120,185,255,0.9),
    0 0 90px rgba(100,160,255,0.4),
    0 0 180px rgba(80,140,255,0.15);
  margin-top: 2rem;
  opacity: 0;
  animation: appear 2s ease 1s forwards;
}
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 1.8vw, 1.4rem);
  font-weight: 300;
  color: rgba(170,210,255,0.55);
  letter-spacing: 0.18em;
  margin-top: 0.8rem;
  text-align: center;
  opacity: 0;
  animation: appear 2s ease 1.4s forwards;
}
.hud-left {
  position: absolute; left: clamp(1.5rem, 3vw, 3rem); top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 1.4rem;
  opacity: 0; animation: appear 2s ease 1.8s forwards;
}
.hud-right {
  position: absolute; right: clamp(1.5rem, 3vw, 3rem); top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 1.4rem; align-items: flex-end;
  opacity: 0; animation: appear 2s ease 1.8s forwards;
}
.hud-item {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.5rem, 0.75vw, 0.62rem);
  letter-spacing: 0.25em;
  color: rgba(130,180,255,0.28);
  text-transform: uppercase;
}
.hud-item span { display:block; color: rgba(190,220,255,0.5); margin-top: 3px; font-size: 1.1em; }
.scan-line {
  position: absolute; width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(100,180,255,0.08), transparent);
  animation: scan 6s linear infinite;
}
.corner-tl,.corner-tr,.corner-bl,.corner-br {
  position:absolute; width:22px; height:22px;
  opacity:0; animation:appear 2s ease 2.2s forwards;
}
.corner-tl{top:1.8rem;left:1.8rem;border-top:1px solid rgba(150,200,255,0.2);border-left:1px solid rgba(150,200,255,0.2);}
.corner-tr{top:1.8rem;right:1.8rem;border-top:1px solid rgba(150,200,255,0.2);border-right:1px solid rgba(150,200,255,0.2);}
.corner-bl{bottom:1.8rem;left:1.8rem;border-bottom:1px solid rgba(150,200,255,0.2);border-left:1px solid rgba(150,200,255,0.2);}
.corner-br{bottom:1.8rem;right:1.8rem;border-bottom:1px solid rgba(150,200,255,0.2);border-right:1px solid rgba(150,200,255,0.2);}
.bottom-bar {
  position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 0.52rem; letter-spacing: 0.35em;
  color: rgba(120,170,255,0.22);
  text-transform: uppercase; white-space: nowrap;
  opacity: 0; animation: appear 2s ease 2.4s forwards;
}
@keyframes appear { from{opacity:0;}to{opacity:1;} }
@keyframes scan { from{top:-1px;}to{top:100%;} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scan-line"></div>
<div class="ui">
  <div class="reticle">
    <div class="reticle-ring"></div>
    <div class="reticle-ring"></div>
    <div class="reticle-ring"></div>
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
    <div class="tick tick-t"></div>
    <div class="tick tick-b"></div>
    <div class="tick tick-l"></div>
    <div class="tick tick-r"></div>
    <div class="center-dot"></div>
  </div>
  <div class="main-title">Sankalan</div>
  <div class="tagline">Where Stars Align &amp; Code Ignites</div>
</div>
<div class="hud-left">
  <div class="hud-item">Velocity<span>0.97c</span></div>
  <div class="hud-item">Sector<span>7G-Alpha</span></div>
  <div class="hud-item">Mode<span>Warp</span></div>
</div>
<div class="hud-right">
  <div class="hud-item">Event<span>Sankalan</span></div>
  <div class="hud-item">Parsec<span>3,241</span></div>
  <div class="hud-item">ETA<span>T–48 HRS</span></div>
</div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="bottom-bar">Interstellar Tech Hackathon · 2025 · Stellar Convergence of Minds</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,cx,cy,t=0,lines=[];

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  cx=W/2; cy=H/2; initLines();
}

function initLines(){
  lines=Array.from({length:400},()=>spawn());
}

function spawn(){
  const angle=Math.random()*Math.PI*2;
  const hue=195+Math.random()*55-25;
  return {
    angle, dist:Math.random()*Math.max(W,H)*0.04,
    speed:Math.random()*5.5+1.2,
    length:0, maxLen:Math.random()*160+55,
    hue, sat:60+Math.random()*40,
    alpha:Math.random()*0.55+0.2,
    width:Math.random()*1.6+0.25
  };
}

function frame(){
  ctx.fillStyle='rgba(0,0,5,0.16)';
  ctx.fillRect(0,0,W,H);

  lines.forEach((l,i)=>{
    l.dist+=l.speed*(1+l.dist*0.0028);
    l.length=Math.min(l.length+l.speed*2.1,l.maxLen);
    const x1=cx+Math.cos(l.angle)*l.dist, y1=cy+Math.sin(l.angle)*l.dist;
    const x2=cx+Math.cos(l.angle)*(l.dist-l.length), y2=cy+Math.sin(l.angle)*(l.dist-l.length);
    const g=ctx.createLinearGradient(x2,y2,x1,y1);
    g.addColorStop(0,`hsla(${l.hue},${l.sat}%,70%,0)`);
    g.addColorStop(0.5,`hsla(${l.hue},${l.sat}%,82%,${l.alpha*0.35})`);
    g.addColorStop(1,`hsla(${l.hue},${l.sat}%,96%,${l.alpha})`);
    ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x1,y1);
    ctx.strokeStyle=g;
    ctx.lineWidth=l.width*(1+l.dist/(Math.max(W,H)*0.28));
    ctx.stroke();
    if(l.dist>Math.max(W,H)*0.88) lines[i]=spawn();
  });

  // centre glow
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.14);
  glow.addColorStop(0,'rgba(0,8,35,0.45)');
  glow.addColorStop(0.6,'rgba(0,4,18,0.22)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

  t++; requestAnimationFrame(frame);
}

window.addEventListener('resize',resize);
resize(); frame();
</script>
</body>
</html>
